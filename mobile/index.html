let tokenClient=null,accessToken='',tokenExpiry=0,lastEmail=readJSON('mtp-mobile-google-email','');
function loadGIS(){return new Promise((resolve,reject)=>{if(window.google?.accounts?.oauth2)return resolve();let s=document.getElementById('gis-script');if(s){s.addEventListener('load',resolve,{once:true});return} s=document.createElement('script');s.id='gis-script';s.src='https://accounts.google.com/gsi/client';s.async=true;s.defer=true;s.onload=resolve;s.onerror=()=>reject(Error('Could not load Google sign-in.'));document.head.appendChild(s)})}
async function signIn(silent=false){
  await loadGIS();return new Promise((resolve,reject)=>{const cfg={client_id:state.sync.clientId||DEFAULT_CLIENT_ID,scope:DRIVE_SCOPE,callback:r=>{if(r.error)return reject(Error(r.error));accessToken=r.access_token;tokenExpiry=Date.now()+(r.expires_in||3600)*1000-60000;rememberEmail();resolve(accessToken)},error_callback:e=>reject(Error(e?.type||'Sign-in cancelled'))};if(lastEmail)cfg.login_hint=lastEmail;tokenClient=google.accounts.oauth2.initTokenClient(cfg);tokenClient.requestAccessToken({prompt:silent?'none':(lastEmail?'':'consent')})})}
async function ensureToken(){if(accessToken&&Date.now()<tokenExpiry)return accessToken;return signIn(false)}
async function rememberEmail(){try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});if(r.ok){const j=await r.json();if(j.email){lastEmail=j.email;writeJSON('mtp-mobile-google-email',lastEmail)}}}catch{}}
async function driveFetch(path,opt={}){const tok=await ensureToken(),r=await fetch('https://www.googleapis.com/'+path,{...opt,headers:{Authorization:'Bearer '+tok,...(opt.headers||{})}});if(r.status===401){accessToken='';throw Error('Google session expired. Connect again.')}if(!r.ok)throw Error(('Drive '+r.status+': '+await r.text().catch(()=>'' )).slice(0,180));return r}
async function listDriveFiles(){const q=encodeURIComponent("mimeType='application/json' and trashed=false");const r=await driveFetch(`drive/v3/files?q=${q}&orderBy=modifiedTime desc&pageSize=1000&fields=files(id,name,modifiedTime,size,parents,webViewLink)`);return (await r.json()).files||[]}
async function driveMeta(id){return (await driveFetch(`drive/v3/files/${id}?fields=id,name,modifiedTime,trashed,size,parents,webViewLink`)).json()}
async function driveDownload(id){return (await driveFetch(`drive/v3/files/${id}?alt=media`)).text()}
async function driveUpdate(id,text){return (await driveFetch(`upload/drive/v3/files/${id}?uploadType=media&fields=id,name,modifiedTime`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:text})).json()}

async function driveRename(id,name){return (await driveFetch(`drive/v3/files/${encodeURIComponent(id)}?fields=id,name,modifiedTime,parents,webViewLink`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})})).json()}
async function driveCreate(name,text,parentId=''){const boundary='-------mtp'+Math.random().toString(36).slice(2),meta={name,mimeType:'application/json'};if(parentId)meta.parents=[parentId];const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${text}\r\n--${boundary}--`;return (await driveFetch('upload/drive/v3/files?uploadType=multipart&fields=id,name,modifiedTime,parents,webViewLink',{method:'POST',headers:{'Content-Type':'multipart/related; boundary='+boundary},body})).json()}
function driveFolderURL(file){const parent=file?.parents?.[0];return parent?'https://drive.google.com/drive/folders/'+encodeURIComponent(parent):'https://drive.google.com/drive/my-drive'}
function cleanCloudName(value){let name=String(value||'').replace(/[\\/\u0000-\u001f]/g,'-').trim().slice(0,180)||'My-Todo-Planner.json';if(!/\.json$/i.test(name))name+='.json';return name}
function uniqueCloudName(files,desired,parentId='',excludeId=''){const clean=cleanCloudName(desired),used=new Set(files.filter(f=>!sameId(f.id,excludeId)&&(!parentId||f.parents?.includes(parentId))).map(f=>String(f.name||'').toLowerCase()));if(!used.has(clean.toLowerCase()))return clean;const stem=clean.replace(/\.json$/i,''),match=stem.match(/^(.*?)(\d+)?$/),base=match?.[1]||stem;let n=Math.max(1,Number(match?.[2])||1),candidate;do{candidate=base+n+'.json';n++}while(used.has(candidate.toLowerCase()));return candidate}
function beginCreateCloudFile(){let folderTab=null;try{folderTab=window.open('about:blank','_blank')}catch{}closeModal();createCloudFile(folderTab)}
function navigateFolderTab(tab,file){const url=driveFolderURL(file);if(tab&&!tab.closed){try{tab.location.replace(url);return}catch{}}window.open(url,'_blank','noopener')}
function setDriveBusy(v){state.driveBusy=v;updateHeader()}
async function connectDrive(){try{setDriveBusy(true);state.driveError='';await signIn(false);toast(tr('connected'));if(state.ui.view==='sync')render()}catch(e){state.driveError=e.message;toast(e.message)}finally{setDriveBusy(false);updateHeader()}}
async function showCloudFiles(){try{setDriveBusy(true);state.driveError='';await ensureToken();state.driveFiles=await listDriveFiles();showFileModal()}catch(e){state.driveError=e.message;toast(e.message);render()}finally{setDriveBusy(false)}}
function showFileModal(){const rows=state.driveFiles.length?state.driveFiles.map(f=>`<div class="file-row"><div class="file-icon">📄</div><div class="file-info"><strong>${esc(f.name)}</strong><span>${new Date(f.modifiedTime).toLocaleString()}</span><a class="drive-folder-link" href="${driveFolderURL(f)}" target="_blank" rel="noopener noreferrer">↗ ${tr('openFolder')}</a></div><div class="file-actions"><button type="button" data-cloud-use="${esc(f.id)}" data-cloud-name="${esc(f.name)}">${tr('useFile')}</button><button type="button" class="file-rename" data-cloud-rename="${esc(f.id)}" data-cloud-name="${esc(f.name)}" aria-label="${esc(tr('renameFile')+' '+f.name)}">✎</button><button type="button" class="file-delete" data-cloud-delete="${esc(f.id)}" data-cloud-name="${esc(f.name)}" aria-label="${esc(tr('deleteCloudFile')+' '+f.name)}">⌫</button></div></div>`).join(''):`<div class="empty"><div class="icon">☁️</div><h4>${tr('noFiles')}</h4></div>`;showModal(tr('cloudFiles'),`<div class="sync-actions two" style="margin-bottom:12px"><button class="primary" type="button" id="modalAddCloud">＋ ${tr('addCloudFile')}</button><button class="secondary" type="button" id="modalRefreshCloud">↻ ${tr('refreshFiles')}</button></div>${rows}`);$$('[data-cloud-use]').forEach(b=>b.onclick=()=>linkCloudFile(b.dataset.cloudUse,b.dataset.cloudName));$$('[data-cloud-rename]').forEach(b=>b.onclick=()=>renameCloudFile(b.dataset.cloudRename,b.dataset.cloudName));$$('[data-cloud-delete]').forEach(b=>b.onclick=()=>deleteCloudFile(b.dataset.cloudDelete,b.dataset.cloudName));$('#modalAddCloud').onclick=beginCreateCloudFile;$('#modalRefreshCloud').onclick=showCloudFiles}
async function renameCloudFile(id,oldName){const requested=prompt(tr('renamePrompt'),oldName);if(requested===null)return;try{setDriveBusy(true);const files=await listDriveFiles(),file=files.find(f=>sameId(f.id,id)),parentId=file?.parents?.[0]||'',name=uniqueCloudName(files,requested,parentId,id),updated=await driveRename(id,name);if(sameId(state.sync.fileId,id)){state.sync.fileName=updated.name;state.sync.lastCloudModified=updated.modifiedTime||state.sync.lastCloudModified;saveLocal(false)}state.driveFiles=await listDriveFiles();toast('✓ '+updated.name);showFileModal()}catch(e){state.driveError=e.message;toast(e.message)}finally{setDriveBusy(false);updateHeader()}}
async function deleteCloudFile(id,name){if(!confirm(tr('deleteCloudConfirm')+'\n'+name))return;try{setDriveBusy(true);await driveDelete(id);if(sameId(state.sync.fileId,id)){state.sync={...state.sync,fileId:'',fileName:'',lastCloudModified:'',lastSyncAt:0,dirty:false};saveLocal(false)}state.driveFiles=await listDriveFiles();toast('✓ '+tr('deleteCloudFile'));showFileModal()}catch(e){state.driveError=e.message;toast(e.message)}finally{setDriveBusy(false);updateHeader()}}
async function linkCloudFile(id,name){try{setDriveBusy(true);const text=await driveDownload(id),data=normalizeProfile(JSON.parse(text));if(!validProfile(data))throw Error('Not a My Todo Planner profile file.');pushHistory('Load cloud file');state.data=data;state.lang=data.config?.lang||state.lang;const m=await driveMeta(id);state.sync={...state.sync,fileId:id,fileName:name||m.name,lastCloudModified:m.modifiedTime||'',lastSyncAt:Date.now(),dirty:false};saveLocal(false);closeModal();toast('✓ '+tr('synced'));render()}catch(e){toast(e.message)}finally{setDriveBusy(false)}}
async function createCloudFile(folderTab=null){try{setDriveBusy(true);await ensureToken();const files=await listDriveFiles();let parentId=files[0]?.parents?.[0]||'';if(state.sync.fileId){const current=files.find(f=>sameId(f.id,state.sync.fileId))||await driveMeta(state.sync.fileId);parentId=current?.parents?.[0]||parentId}const name=uniqueCloudName(files,'My-Todo-Planner.json',parentId),r=await driveCreate(name,JSON.stringify(prepareForSave(),null,2),parentId);state.sync={...state.sync,fileId:r.id,fileName:r.name,lastCloudModified:r.modifiedTime||'',lastSyncAt:Date.now(),dirty:false};state.driveFiles=[r,...files];saveLocal(false);toast('✓ '+r.name);render();navigateFolderTab(folderTab,r)}catch(e){if(folderTab&&!folderTab.closed)folderTab.close();state.driveError=e.message;toast(e.message);render()}finally{setDriveBusy(false)}}
async function syncNow(silent=false){if(!navigator.onLine){if(!silent)toast(tr('offline'));return}if(!state.sync.fileId){if(!silent)toast(tr('selectFile'));return}try{setDriveBusy(true);state.driveError='';await ensureToken();const meta=await driveMeta(state.sync.fileId);if(meta.trashed)throw Error('Cloud file was deleted.');const cloudChanged=!!state.sync.lastCloudModified&&meta.modifiedTime!==state.sync.lastCloudModified;if(cloudChanged&&state.sync.dirty){showConflict(meta);return}if(cloudChanged&&!state.sync.dirty){const text=await driveDownload(state.sync.fileId),data=normalizeProfile(JSON.parse(text));pushHistory('Pull cloud changes');state.data=data;state.lang=data.config?.lang||state.lang;state.sync.lastCloudModified=meta.modifiedTime;state.sync.lastSyncAt=Date.now();state.sync.dirty=false;saveLocal(false);if(!silent)toast('↓ '+tr('synced'));render();return}if(state.sync.dirty){const r=await driveUpdate(state.sync.fileId,JSON.stringify(prepareForSave(),null,2));state.sync.lastCloudModified=r.modifiedTime||meta.modifiedTime;state.sync.lastSyncAt=Date.now();state.sync.dirty=false;saveLocal(false);if(!silent)toast('↑ '+tr('synced'));render();return}state.sync.lastSyncAt=Date.now();saveLocal(false);if(!silent)toast('✓ '+tr('synced'));render()}catch(e){state.driveError=e.message;if(!silent)toast(e.message);render()}finally{setDriveBusy(false)}}
function showConflict(meta){showModal(tr('conflict'),`<p class="note" style="font-size:14px">Both this device and Google Drive changed since the last sync. Choose the source of truth.</p><div class="sync-actions"><button class="primary" id="conflictPull">↓ ${tr('pullCloud')}</button><button class="secondary" id="conflictPush">↑ ${tr('pushLocal')}</button><button class="secondary" id="conflictExport">${tr('exportFirst')}</button></div>`);$('#conflictPull').onclick=async()=>{const text=await driveDownload(state.sync.fileId);pushHistory('Resolve conflict from cloud');state.data=normalizeProfile(JSON.parse(text));state.sync.lastCloudModified=meta.modifiedTime;state.sync.lastSyncAt=Date.now();state.sync.dirty=false;saveLocal(false);closeModal();render()};$('#conflictPush').onclick=async()=>{const r=await driveUpdate(state.sync.fileId,JSON.stringify(prepareForSave(),null,2));state.sync.lastCloudModified=r.modifiedTime||meta.modifiedTime;state.sync.lastSyncAt=Date.now();state.sync.dirty=false;saveLocal(false);closeModal();render()};$('#conflictExport').onclick=exportJSON}
function bindSync(){
  $('#connectDrive').onclick=connectDrive;$('#syncNow').onclick=()=>syncNow(false);$('#selectCloud').onclick=showCloudFiles;$('#createCloud').onclick=beginCreateCloudFile;$('#openFileList')&&($('#openFileList').onclick=showCloudFiles);$('#exportJson').onclick=exportJSON;$('#importJson').onclick=()=>$('#fileInput').click();
  $('#storageExport').onclick=exportJSON;$('#storageRefresh').onclick=render;$('#clearHistory').onclick=clearEditHistory;$('#archiveOld').onclick=archiveOldCompleted;$('#saveStorageLimit').onclick=saveStorageLimit;$('#ackStorage')&&($('#ackStorage').onclick=acknowledgeStorage);

function downloadJSON(data,fileName){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=fileName;a.rel='noopener';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}

function archiveOldCompleted(){
  const cutoff=Date.now()-365*86400000,personal=state.data.personal.filter(t=>isDone(t)&&archiveTaskDate(t)&&archiveTaskDate(t)<cutoff),work=state.data.work.filter(t=>isDone(t)&&archiveTaskDate(t)&&archiveTaskDate(t)<cutoff),count=personal.length+work.length;
  if(!count){toast(tr('noArchive'));return}if(!confirm(tr('archiveConfirm')+' ('+count+')'))return;
  const archive={version:7,appVersion:APP_VERSION,archiveType:'completed-tasks',archivedAt:new Date().toISOString(),profile:cloneProfileData(state.data.profile||{}),personal:cloneProfileData(personal),work:cloneProfileData(work),events:[],notes:[],config:{lang:state.lang},summary:{personalCount:personal.length,workCount:work.length,doneCount:count,overdueCount:0}};
  downloadJSON(archive,'My-Todo-Planner-Archive-'+todayISO()+'.json');
  const personalSet=new Set(personal),workSet=new Set(work);state.data.personal=state.data.personal.filter(t=>!personalSet.has(t));state.data.work=state.data.work.filter(t=>!workSet.has(t));editHistory.undo.length=0;editHistory.redo.length=0;saveLocal(true);toast('✓ '+tr('archiveDone')+' · '+count);render();
}
